name: nokhchiin
description: Нохчийн — лучшая платформа для изучения чеченского языка
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  equatable: 2.1.0
  uuid: ^4.5.1
  collection: ^1.19.1
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  flutter_tts: ^4.2.0
  audioplayers: ^6.4.0
  in_app_purchase: ^3.2.1
  flutter_svg: ^2.2.0
  sentry_flutter: 9.23.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  sentry: 9.23.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive: ^2.2.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6
  patrol: ^4.6.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/brand/icon.png"
  adaptive_icon_background: "#1B6B4A"
  adaptive_icon_foreground: "assets/images/brand/android-icon-foreground.png"
  adaptive_icon_monochrome: "assets/images/brand/android-icon-monochrome.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FAFBFC"
  color_dark: "#0F1419"
  image: "assets/images/brand/splash-icon.png"
  android_12:
    image: "assets/images/brand/splash-icon.png"
    color: "#FAFBFC"
    color_dark: "#0F1419"
  android: true
  ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/dictionary.json
    - assets/data/lessons.json
    - assets/data/curated_vocabulary.json
    - assets/data/learning_path.json
    - assets/data/worlds.json
    - assets/data/collections.json
    - assets/data/stories.json
    - assets/data/bosses.json
    - assets/data/audio_manifest.json
    - assets/data/illustrations_manifest.json
    - assets/audio/
    # Явный список вместо всей директории: остальные файлы в
    # assets/images/brand/ (icon.png, splash-icon.png, android-icon-*.png,
    # favicon.png) — это исходники для flutter_launcher_icons/
    # flutter_native_splash, которые читают их напрямую из pubspec при
    # генерации нативных ресурсов и не нуждаются в бандлинге как рантайм-
    # ассеты — раньше ~1.3 МБ лишнего веса в каждой сборке (аудит §4).
    - assets/images/brand/culture_guest.png
    - assets/images/brand/culture_hospitality.png
    - assets/icons/
