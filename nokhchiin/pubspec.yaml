name: nokhchiin
description: Нохчийн — лучшая платформа для изучения чеченского языка
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  collection: ^1.19.1
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  flutter_tts: ^4.2.0
  audioplayers: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/dictionary.json
    - assets/data/lessons.json
    - assets/data/curated_vocabulary.json
    - assets/data/learning_path.json
    - assets/data/worlds.json
    - assets/data/collections.json
    - assets/data/stories.json
    - assets/data/bosses.json
    - assets/data/audio_manifest.json
    - assets/data/illustrations_manifest.json
    - assets/audio/
